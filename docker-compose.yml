services:
  # Postgres is optional — only needed if you set DATABASE_URL to a postgres:// URL.
  # SQLite is the default and requires no container. To use Postgres, uncomment this
  # service and update DATABASE_URL in .env.
  #
  # postgres:
  #   image: postgres:17
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${POSTGRES_DB}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #     - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  happyview:
    image: rust:1.93
    working_dir: /app
    command: cargo run
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-target:/app/target
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_URL: ${PUBLIC_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      RELAY_URL: ${RELAY_URL}
      PORT: ${PORT}
    # depends_on:
    #   Uncomment if using Postgres:
    #   postgres:
    #     condition: service_healthy

  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
    environment:
      HOSTNAME: ${WEB_HOSTNAME}
      API_URL: ${API_URL}

volumes:
  # Uncomment if using Postgres:
  # pgdata:
  cargo-registry:
  cargo-git:
  cargo-target:
  web-node-modules:
